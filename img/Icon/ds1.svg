<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#f7f5f0" rx="44"/> <!-- 浅米白圆角底，模拟手机图标背景 -->

  <!-- 外层 V（较大） -->
  <polyline points="45,140 100,50 155,140" fill="none" stroke="#7a7a7a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 内层 V（较小，倒置？这里保持同向，但向内缩进） -->
  <polyline points="65,125 100,75 135,125" fill="none" stroke="#9a9a9a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 最内层微小的 V（几乎一个点） -->
  <polyline points="85,112 100,95 115,112" fill="none" stroke="#b0b0b0" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 可选：底部小字 -->
  <text x="100" y="178" font-family="system-ui, sans-serif" font-size="10" fill="#aaa" text-anchor="middle" letter-spacing="2">AVIV</text>
</svg>